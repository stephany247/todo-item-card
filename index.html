<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <article data-testid="test-todo-card" id="todo-card">
        <div id="view-mode">
          <!-- Header: checkbox + title + priority -->
          <div class="card-header">
            <label class="checkbox-label">
              <input
                type="checkbox"
                data-testid="test-todo-complete-toggle"
                id="complete-toggle"
                aria-label="Mark task as complete"
              />
              <h2 data-testid="test-todo-title" id="todo-title">
                Design new onboarding flow for mobile app
              </h2>
            </label>
            <span
              data-testid="test-todo-priority"
              class="badge priority-high"
              aria-label="Priority: High"
            >
              High
            </span>
          </div>

          <!-- Description -->
          <p data-testid="test-todo-description">
            Create wireframes and prototypes for the revamped mobile onboarding
            experience. Coordinate with the UX team on brand guidelines and
            accessibility requirements.
          </p>

          <!-- Due date + time remaining -->
          <div class="meta">
            <time
              data-testid="test-todo-due-date"
              datetime="2026-04-17T18:00:00Z"
            >
              Due Apr 17, 2026
            </time>
            <time
              data-testid="test-todo-time-remaining"
              id="time-remaining"
              aria-live="polite"
            ></time>
          </div>

          <!-- Status + action buttons -->
          <div class="card-footer">
            <div class="status-row">
              <span
                data-testid="test-todo-status"
                id="status-badge"
                class="badge status-progress"
                aria-label="Status: In Progress"
              >
                In Progress
              </span>
              <label for="status-control" class="sr-only">Change status</label>
              <select
                data-testid="test-todo-status-control"
                id="status-control"
                aria-label="Change task status"
              >
                <option value="Pending">Pending</option>
                <option value="In Progress" selected>In Progress</option>
                <option value="Done">Done</option>
              </select>
            </div>

            <div class="actions">
              <button
                type="button"
                id="edit-btn"
                data-testid="test-todo-edit-button"
                aria-label="Edit task"
                onclick="console.log('edit clicked')"
              >
                Edit
              </button>
              <button
                type="button"
                data-testid="test-todo-delete-button"
                aria-label="Delete task"
                onclick="alert('Delete clicked')"
              >
                Delete
              </button>
            </div>
          </div>

          <!-- Tags -->
          <ul role="list" data-testid="test-todo-tags">
            <li data-testid="test-todo-tag-work" role="listitem">work</li>
            <li data-testid="test-todo-tag-urgent" role="listitem">urgent</li>
            <li data-testid="test-todo-tag-design" role="listitem">design</li>
          </ul>
        </div>

        <!-- edit mode -->
        <div id="edit-mode" hidden>
          <div data-testid="test-todo-edit-form" id="edit-form">
            <div class="form-group">
              <label for="edit-title-input">Title</label>
              <input
                type="text"
                data-testid="test-todo-edit-title-input"
                id="edit-title-input"
              />
            </div>

            <div class="form-group">
              <label for="edit-description-input">Description</label>
              <textarea
                data-testid="test-todo-edit-description-input"
                id="edit-description-input"
                rows="4"
              ></textarea>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="edit-priority-select">Priority</label>
                <select
                  data-testid="test-todo-edit-priority-select"
                  id="edit-priority-select"
                >
                  <option value="Low">Low</option>
                  <option value="Medium">Medium</option>
                  <option value="High" selected>High</option>
                </select>
              </div>

              <div class="form-group">
                <label for="edit-due-date-input">Due date</label>
                <input
                  type="datetime-local"
                  data-testid="test-todo-edit-due-date-input"
                  id="edit-due-date-input"
                />
              </div>
            </div>

            <div class="form-actions">
              <button data-testid="test-todo-save-button" id="save-btn">
                Save
              </button>
              <button data-testid="test-todo-cancel-button" id="cancel-btn">
                Cancel
              </button>
            </div>
          </div>
        </div>
      </article>
    </main>

    <script src="app.js"></script>
  </body>
</html>
